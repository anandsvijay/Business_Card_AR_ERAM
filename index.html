    <script>
        // Configuration variables
        let PORTFOLIO_ITEM_ID = 'Signage-item';

        AFRAME.registerComponent('occluder', {
          init: function () {
            this.el.addEventListener('model-loaded', () => {
              this.el.getObject3D('mesh').traverse((node) => {
                if (node.isMesh) {
                  node.material.colorWrite = false;
                }
              });
            });
            // For basic primitives like a-box or a-plane
            const mesh = this.el.getObject3D('mesh');
            if (mesh) {
              mesh.traverse((node) => {
                if (node.isMesh) {
                  node.material.colorWrite = false;
                }
              });
            }
          }
        });

          AFRAME.registerComponent('model-opacity', {
            schema: { default: 1.0 },
            init: function () {
              this.el.addEventListener('model-loaded', () => {
                this.update();
              });
            },
            update: function () {
              const mesh = this.el.getObject3D('mesh');
              const data = this.data;
              if (!mesh) return;
              mesh.traverse((node) => {
                if (node.isMesh) {
                  node.material.opacity = data;
                  node.material.transparent = data < 1.0;
                  node.material.needsUpdate = true;
                }
              });
            }
          });

      const showInfo = () => {
        const webButton = document.querySelector("#web-button");
        const phoneButton = document.querySelector("#phone-button");
        const locationButton = document.querySelector("#location-button");
        const emailButton = document.querySelector("#Email-button");
        const text = document.querySelector("#text");

        webButton.setAttribute("visible", true);
        setTimeout(() => {
          phoneButton.setAttribute("visible", true);
        }, 300);
        setTimeout(() => {
          locationButton.setAttribute("visible", true);
          text.setAttribute("visible", true);
        }, 600);
        setTimeout(() => {
          emailButton.setAttribute("visible", true);
        }, 900);

        let currentTab = '';
        webButton.addEventListener('click', function (evt) {
          text.setAttribute("value", "https://uarkprinting.com");
          currentTab = 'web';
        });
        phoneButton.addEventListener('click', function (evt) {
          text.setAttribute("value", "+966 13 802 1919");
          currentTab = 'phone';
        });
        locationButton.addEventListener('click', function (evt) {
          console.log("loc");
          text.setAttribute("value", "2ب، 4416, Dammam 34341, Saudi Arabia");
          currentTab = 'location';
        });
        emailButton.addEventListener('click', function (evt) {
          text.setAttribute("value", "info@uarkprinting.com");
          currentTab = 'email';
        });

        text.addEventListener('click', function (evt) {
          if (currentTab === 'web') {
            window.location.href="https://uarkprinting.com/contact.php";
          }
        });
      }

const showPortfolio = (done) => {
  const portfolio = document.querySelector("#portfolio-panel");
  const portfolioLeftButton = document.querySelector("#portfolio-left-button");
  const portfolioRightButton = document.querySelector("#portfolio-right-button");
  let currentItem = 0;

  portfolio.setAttribute("visible", true);
  portfolioLeftButton.setAttribute("visible", true);
  portfolioRightButton.setAttribute("visible", true);

  // MOVE THE numItems LOGIC INSIDE showPortfolioItem
  const showPortfolioItem = (item) => {
    // 1. First, find how many items exist for the CURRENT active category
    let numItems = 0;
    while (document.querySelector(`#${PORTFOLIO_ITEM_ID.trim()}${numItems}`)) {
      numItems++;
    }

    // 2. Loop through and set visibility, only if the element is found
    // We check all possible items in the DOM to ensure we hide the old category too
    const allPortfolioItems = document.querySelectorAll('[id*="-item"]');
    allPortfolioItems.forEach(el => el.setAttribute("visible", false));

    // 3. Show only the specific item from the new category
    const activeEl = document.querySelector(`#${PORTFOLIO_ITEM_ID.trim()}${item}`);
    if (activeEl) {
      activeEl.setAttribute("visible", true);
    }
    
    return numItems; // Return this to update the click listeners
  };

  // Update listeners to use the dynamic count
  portfolioLeftButton.onclick = () => {
    let num = 0;
    while (document.querySelector(`#${PORTFOLIO_ITEM_ID.trim()}${num}`)) { num++; }
    currentItem = (currentItem + 1) % num;
    showPortfolioItem(currentItem);
  };

  portfolioRightButton.onclick = () => {
    let num = 0;
    while (document.querySelector(`#${PORTFOLIO_ITEM_ID.trim()}${num}`)) { num++; }
    currentItem = (currentItem - 1 + num) % num;
    showPortfolioItem(currentItem);
  };

  // Initial show
  showPortfolioItem(currentItem);

  setTimeout(() => {
    done();
  }, 500);
}

      const moveObject = (el, deltaZ) => {
        const currentPos = el.getAttribute('position');
        let z = currentPos.z;
        const targetZ = deltaZ;
        const id = setInterval(() => {
          z += 0.008;
          if (z >= targetZ) {
            z = targetZ;
            clearInterval(id);
          }
          el.setAttribute('position', `${currentPos.x} ${currentPos.y} ${z}`);
        }, 10);
      }

        AFRAME.registerComponent('mytarget', {
          init: function () {
            this.el.addEventListener('targetFound', event => {
              console.log("target found");
              const models = document.querySelectorAll('a-gltf-model');

              // Select the logo specifically to watch its animation
              const logo = document.querySelector('a-gltf-model#ERAM_Logo');
              const servicesDoors = document.querySelector('#Services_Doors');

              models.forEach((model) => {
                // Start/Resume the animation
                model.setAttribute('animation-mixer', {
                  clip: '*',
                  loop: 'once',
                  clampWhenFinished: true,
                  timeScale: 1
                });
              });

              // Keep Services_Doors paused until OurServices becomes visible
              if (servicesDoors) {
                servicesDoors.setAttribute('animation-mixer', {
                  clip: '*',
                  loop: 'once',
                  clampWhenFinished: true,
                  timeScale: 0
                });
              }

              // 1. Listen for the Logo to finish
              if (logo && !this.animationHandled) {
                logo.addEventListener('animation-finished', () => {
                  console.log("Logo animation finished! Cleaning up...");

                  // 2. Exact matches for the IDs in your HTML
                  const idsToRemove = ['ERAM_Box', 'ERAM_Doors', 'ERAM_Occluder', 'ERAM_Light'];

                  idsToRemove.forEach(id => {
                    const el = document.getElementById(id);
                    if (el && el.parentNode) {
                      el.parentNode.removeChild(el);
                    }
                  });

                  // 3. Show the services group and play its doors animation
                  const ourServices = document.querySelector('#OurServices');
                  if (ourServices) {
                    ourServices.setAttribute('visible', true);

                    const serviceLightMap = [
                      { serviceId: 'Services_Signage', lightId: 'Services_Light1', portfolioID: 'Signage-item' },
                      { serviceId: 'Services_Graphic', lightId: 'Services_Light2', portfolioID: 'Graphic-item' },
                      { serviceId: 'Services_Gift', lightId: 'Services_Light3', portfolioID: 'Gift-item' },
                      { serviceId: 'Services_Printing', lightId: 'Services_Light4', portfolioID: 'Printing-item' },
                      { serviceId: 'Services_Package', lightId: 'Services_Light5', portfolioID: 'Package-item' },
                      { serviceId: 'Services_Garden', lightId: 'Services_Light6', portfolioID: 'Garden-item' }
                    ];

                    // Turn all service lights off initially
                    serviceLightMap.forEach(({ lightId }) => {
                      const lightEl = document.getElementById(lightId);
                      if (lightEl) {
                        lightEl.setAttribute('intensity', 0);
                      }
                    });

                    // Add click listeners to bring services forward and turn on their light
                    let previousService = null;
                    let previousLight = null;
                    let previousPortfolio = null;
                    
                    serviceLightMap.forEach(({ serviceId, lightId, portfolioID }) => {
                      const el = document.getElementById(serviceId);
                      const lightEl = document.getElementById(lightId);
                      const portEl = document.getElementById(portfolioID);
                      if (el) {
                        el.addEventListener('click', () => {
                          // If same object clicked, do nothing
                          if (previousService === serviceId) {
                            return;
                          }
                          
                          // Reset previous service
                          if (previousService !== null) {
                            const prevEl = document.getElementById(previousService);
                            const prevLightEl = document.getElementById(previousLight);
                            const prevPortEl = document.getElementById(previousPortfolio);

                            moveObject(prevEl, 0);
                            if (prevLightEl) {
                              prevLightEl.setAttribute('intensity', 0);
                            }
                          }
                          
                          // Activate new service
                          moveObject(el, 0.1);
                          if (lightEl) {
                            lightEl.setAttribute('intensity', 50);
                            PORTFOLIO_ITEM_ID = portfolioID.trim();
                            showPortfolio(() => { });
                            console.log(PORTFOLIO_ITEM_ID);
                          }
                          
                          // Store as previous
                          previousService = serviceId;
                          previousLight = lightId;
                          previousPortfolio = portfolioID;
                        });
                      }
                    });
                  }
                  if (servicesDoors) {
                    servicesDoors.setAttribute('animation-mixer', { timeScale: 1 });
                  }

                  // 5. Trigger UI sequence after cleanup
                  if (!this.uiStarted) {

                      setTimeout(() => {
                        showInfo();
                      }, 300);

                    this.uiStarted = true;
                  }
                }, { once: true });

                this.animationHandled = true;
              }
            });

            this.el.addEventListener('targetLost', event => {
              console.log("target lost");
              document.querySelectorAll('a-gltf-model').forEach((model) => {
                model.setAttribute('animation-mixer', { timeScale: 0 });
              });
            });
          }
        });
    </script>

    <style>
      body {
        margin: 0;
      }
      .example-container {
        overflow: hidden;
        position: absolute;
        width: 100%;
        height: 100%;
      }
     
      #example-scanning-overlay {
	display: flex;
	align-items: center;
	justify-content: center;
	position: absolute;
	left: 0;
	right: 0;
	top: 0;
	bottom: 0;
	background: transparent;
	z-index: 2;
      }
      @media (min-aspect-ratio: 1/1) {
	#example-scanning-overlay .inner {
	  width: 50vh;
	  height: 50vh;
	}
      }
      @media (max-aspect-ratio: 1/1) {
	#example-scanning-overlay .inner {
	  width: 80vw;
	  height: 80vw;
	}
      }

      #example-scanning-overlay .inner {
	display: flex;
	align-items: center;
	justify-content: center;
	position: relative;

	background:
	  linear-gradient(to right, white 10px, transparent 10px) 0 0,
	  linear-gradient(to right, white 10px, transparent 10px) 0 100%,
	  linear-gradient(to left, white 10px, transparent 10px) 100% 0,
	  linear-gradient(to left, white 10px, transparent 10px) 100% 100%,
	  linear-gradient(to bottom, white 10px, transparent 10px) 0 0,
	  linear-gradient(to bottom, white 10px, transparent 10px) 100% 0,
	  linear-gradient(to top, white 10px, transparent 10px) 0 100%,
	  linear-gradient(to top, white 10px, transparent 10px) 100% 100%;
	background-repeat: no-repeat;
	background-size: 40px 40px;
      }

      #example-scanning-overlay.hidden {
	display: none;
      }

      #example-scanning-overlay img {
	opacity: 0.6;
	width: 90%;
	align-self: center;
      }

      #example-scanning-overlay .inner .scanline {
	position: absolute;
	width: 100%;
	height: 10px;
	background: white;
	animation: move 2s linear infinite;
      }
      @keyframes move {
	0%, 100% { top: 0% }
	50% { top: calc(100% - 10px) }
      }
    </style>
